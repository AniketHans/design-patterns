services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile

    volumes:
      - ../..:/workspaces:cached

    command: sleep infinity

  redis:
    image: redis

  vector-db:
    image: qdrant/qdrant
    ports:
      - 6333:6333

  mongodb:
    image: mongo
    ports:
      - 27017:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
    volumes:
      - mongodb_data:/data/db

  postgres_db:
    image: postgres:18
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: task-mgmt
    volumes:
      - postgres_data:/var/lib/postgresql/18/data
    ports:
      - 5432:5432
volumes:
  mongodb_data:
  postgres_data:
